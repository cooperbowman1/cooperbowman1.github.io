        <div class="projects-container">

                <!-- Add more sticker project tiles here if needed -->
            </div>

    <style>
        /* Specific styling for the projects section only */
        .projects-container {
            width: 75%;
            padding: 10px;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 50px;
            margin-top: -50px;
        }
        
        .project-tile {
            background: #000000;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
			will-change: transform;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 1px solid #FFFFFF;
        }
        
        .project-tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
            border: 1px solid #999999;
        }
        
        .project-link {
            text-decoration: none;
            color: inherit;
            display: block;
            height: 100%;
        }
        
        .project-image {
            height: 550px;
            overflow: hidden;
        }
        
        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s ease;
        }
        
        .project-tile:hover .project-image img {
            transform: scale(1.1);
        }
        
        .project-info {
            padding: 15px;
        }
        
        .project-info h3 {
            margin: 0 0 8px 0;
            color: #FFFFFF;
            font-size: 24px;
        }
        
        .project-info p {
            margin: 0;
            color: #666;
            font-size: 16px;
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .projects-container {
                width: 100%;
            }
            
            .projects-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }
    </style>
</body>
</html>
