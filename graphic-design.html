    <style>
        /* Desktop / tablet project grid — mobile is handled entirely by mobile.css */
        @media (min-width: 768px) {
            .projects-container {
                width: 75%;
                padding: 10px;
            }

            .projects-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
                gap: 50px;
                margin-top: -50px;
            }

            .project-tile {
                background: #000000;
                border-radius: 8px;
                overflow: hidden;
                transition: transform 0.3s ease, box-shadow 0.3s ease;
                will-change: transform;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                border: 1px solid #FFFFFF;
            }

            .project-tile:hover {
                transform: translateY(-5px);
                box-shadow: 0 12px 20px rgba(0,0,0,0.15);
                border: 1px solid #999999;
            }

            .project-link {
                text-decoration: none;
                color: inherit;
                display: block;
                height: 100%;
            }

            .project-image {
                height: 550px;
                overflow: hidden;
            }

            .project-image img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 1s ease;
            }

            .project-tile:hover .project-image img {
                transform: scale(1.1);
            }

            .project-info {
                padding: 15px;
            }

            .project-info h3 {
                margin: 0 0 8px 0;
                color: #FFFFFF;
                font-size: 24px;
            }

            .project-info p {
                margin: 0;
                color: #666;
                font-size: 16px;
            }
        }
    </style>
	
	<script>
    // Function to select a random collage image
    function setRandomCollage() {
        // Generate a random number between 1 and 10
        const randomNum = Math.floor(Math.random() * 10) + 1;
        
        // Create the image path
        const imagePath = `images/image${randomNum}.jpg`;
        
        // Get the image element and set its source
        const imgElement = document.getElementById('random-collage');
        if (imgElement) {
            imgElement.src = imagePath;
        }
    }
    
    // Set the random image when the page loads
    window.addEventListener('load', setRandomCollage);
</script>
